name: CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle with cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build and test
        run: ./gradlew --no-daemon clean build

      - name: Verify prod profile is packaged in jar
        run: |
          ./gradlew --no-daemon bootJar -x test
          jar tf build/libs/app.jar | grep -E 'BOOT-INF/classes/application(-prod|-local)?\.yml|BOOT-INF/classes/application\.yml'
          jar tf build/libs/app.jar | grep -q 'BOOT-INF/classes/application-prod.yml'

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_id }}
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 7
