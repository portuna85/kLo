name: CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle with cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install frontend dev dependencies
        run: npm ci

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend unit tests
        run: npm test

      - name: Build and test
        run: ./gradlew --no-daemon clean build

      - name: Build REST Docs
        run: ./gradlew --no-daemon asciidoctor

      - name: Build jar with REST Docs
        run: ./gradlew --no-daemon bootJarWithDocs

      - name: Verify prod profile resources are packaged in jar
        run: |
          ./gradlew --no-daemon bootJarWithDocs -x test
          unzip -l build/libs/app-with-docs.jar \
            | grep -E 'BOOT-INF/classes/application-(prod|local)\.yml' \
            | wc -l | xargs test 2 -eq

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_id }}
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 7

      - name: Upload REST Docs snippets
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restdocs-snippets-${{ github.run_id }}
          path: build/generated-snippets/
          retention-days: 7
