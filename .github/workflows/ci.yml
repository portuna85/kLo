name: CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle with cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build (compile + bootJar)
        run: |
          ./gradlew --no-daemon clean classes
          mkdir -p build/generated-snippets
          ./gradlew --no-daemon build -x test -x clean

      - name: Run tests
        run: ./gradlew --no-daemon test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_id }}
          path: |
            build/reports/tests/
            build/test-results/
          retention-days: 7