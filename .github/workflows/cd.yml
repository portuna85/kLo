name: CD - Deploy to kraft-server

on:
  workflow_run:
    workflows: [ "CI" ]
    branches: [ main ]
    types: [ completed ]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (commit SHA/tag/branch) to deploy"
        required: true

permissions:
  contents: read
  actions: read

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via Docker Compose
    runs-on: [ self-hosted, linux, x64 ]
    environment: production
    timeout-minutes: 20
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Resolve deploy ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.ref }}" ]; then
            echo "value=${{ github.event.inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fix permissions
        run: |
          sudo chown -R $USER:$USER $GITHUB_WORKSPACE || true

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.ref.outputs.value }}

      - name: Make deploy scripts executable
        run: chmod +x scripts/deploy/*.sh

      - name: Verify prod profile files exist in source
        run: |
          test -f src/main/resources/application.yml
          test -f src/main/resources/application-local.yml
          test -f src/main/resources/application-prod.yml

      - name: Validate required production secrets
        env:
          ALL_SECRETS_JSON: ${{ toJson(secrets) }}
        run: ./scripts/deploy/validate-env.sh

      - name: Mask production secrets in logs
        env:
          ALL_SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          set -eu
          while IFS= read -r name; do
            [ -z "$name" ] && continue
            value="$(printf '%s' "$ALL_SECRETS_JSON" | jq -r --arg key "$name" '.[$key] // ""')"
            [ -z "$value" ] && continue
            printf '::add-mask::%s\n' "$value"
          done < .required-envs

      - name: Create .env (safe)
        env:
          ALL_SECRETS_JSON: ${{ toJson(secrets) }}
          KRAFT_DB_NAME: ${{ secrets.KRAFT_DB_NAME }}
        run: ./scripts/deploy/render-env.sh

      - name: Validate Docker Compose file
        run: docker compose config -q

      - name: Generate snippets for deploy build
        run: ./gradlew --no-daemon test

      - name: Verify snippets for Docker build
        run: |
          test -d build/generated-snippets
          test -n "$(find build/generated-snippets -type f | head -n 1)"

      - name: Prepare logs directory for bind mount
        run: ./scripts/deploy/prepare-logs.sh

      - name: Build and restart services
        env:
          KRAFT_APP_IMAGE_REF: kraft-lotto-app
          KRAFT_APP_IMAGE_TAG: ${{ steps.ref.outputs.value }}
        run: ./scripts/deploy/build-and-up.sh

      - name: Verify prod profile env in container
        run: |
          PROFILE=$(docker compose exec -T app sh -lc 'printenv SPRING_PROFILES_ACTIVE')
          echo "SPRING_PROFILES_ACTIVE=$PROFILE"
          test "$PROFILE" = "prod"

      - name: Wait for app readiness
        run: ./scripts/deploy/wait-readiness.sh

      - name: Rollback when readiness failed
        if: failure()
        run: ./scripts/deploy/rollback.sh

      - name: Smoke test
        env:
          KRAFT_ADMIN_API_TOKENS: ${{ secrets.KRAFT_ADMIN_API_TOKENS }}
        run: ./scripts/deploy/smoke-test.sh

      - name: Cleanup .env
        if: always()
        run: rm -f .env .required-envs
