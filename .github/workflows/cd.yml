name: CD - Deploy to kraft-server

on:
  workflow_run:
    workflows: [ "CI" ]
    branches: [ main ]
    types: [ completed ]
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via Docker Compose
    runs-on: [ self-hosted, linux, x64 ]
    environment: production
    timeout-minutes: 20
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Fix permissions
        run: |
          sudo chown -R $USER:$USER $GITHUB_WORKSPACE || true

      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify prod profile files exist in source
        run: |
          test -f src/main/resources/application.yml
          test -f src/main/resources/application-local.yml
          test -f src/main/resources/application-prod.yml

      - name: Validate required production secrets
        env:
          KRAFT_DB_NAME: ${{ secrets.KRAFT_DB_NAME }}
          KRAFT_DB_USER: ${{ secrets.KRAFT_DB_USER }}
          KRAFT_DB_PASSWORD: ${{ secrets.KRAFT_DB_PASSWORD }}
          KRAFT_DB_ROOT_PASSWORD: ${{ secrets.KRAFT_DB_ROOT_PASSWORD }}
          KRAFT_ADMIN_API_TOKEN: ${{ secrets.KRAFT_ADMIN_API_TOKEN }}
        run: |
          set -eu
          for name in KRAFT_DB_NAME KRAFT_DB_USER KRAFT_DB_PASSWORD KRAFT_DB_ROOT_PASSWORD KRAFT_ADMIN_API_TOKEN; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name GitHub Secret is required for production deploy"
              exit 1
            fi
          done

      - name: Create .env from secrets
        env:
          KRAFT_DB_NAME: ${{ secrets.KRAFT_DB_NAME }}
          KRAFT_DB_USER: ${{ secrets.KRAFT_DB_USER }}
          KRAFT_DB_PASSWORD: ${{ secrets.KRAFT_DB_PASSWORD }}
          KRAFT_DB_ROOT_PASSWORD: ${{ secrets.KRAFT_DB_ROOT_PASSWORD }}
          KRAFT_ADMIN_API_TOKEN: ${{ secrets.KRAFT_ADMIN_API_TOKEN }}
        run: |
          set -eu
          cat > .env <<EOF
          SPRING_PROFILES_ACTIVE=prod
          KRAFT_APP_PORT=8080
          KRAFT_DB_NAME=${KRAFT_DB_NAME}
          KRAFT_DB_URL=jdbc:mariadb://mariadb:3306/${KRAFT_DB_NAME}?rewriteBatchedStatements=true&useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul&connectTimeout=3000
          KRAFT_DB_USER=${KRAFT_DB_USER}
          KRAFT_DB_PASSWORD=${KRAFT_DB_PASSWORD}
          KRAFT_DB_ROOT_PASSWORD=${KRAFT_DB_ROOT_PASSWORD}
          KRAFT_DB_LOCAL_HOST=localhost
          KRAFT_IN_CONTAINER=true
          KRAFT_API_CLIENT=real
          KRAFT_API_URL=https://www.dhlottery.co.kr/common.do
          KRAFT_API_CONNECT_TIMEOUT_MS=2000
          KRAFT_API_READ_TIMEOUT_MS=3000
          KRAFT_API_MAX_RETRIES=2
          KRAFT_API_RETRY_BACKOFF_MS=200
          KRAFT_ADMIN_API_TOKEN=${KRAFT_ADMIN_API_TOKEN}
          KRAFT_ADMIN_TOKEN_HEADER=X-Kraft-Admin-Token
          KRAFT_RECOMMEND_MAX_ATTEMPTS=5000
          KRAFT_RECOMMEND_RATE_LIMIT_MAX_REQUESTS=30
          KRAFT_RECOMMEND_RATE_LIMIT_WINDOW_SECONDS=60
          KRAFT_RECOMMEND_RATE_LIMIT_REDIS_ENABLED=false
          KRAFT_RECOMMEND_RATE_LIMIT_REDIS_KEY_PREFIX=kraft:rate-limit
          KRAFT_TRACING_ENABLED=false
          KRAFT_TRACING_SAMPLING_PROBABILITY=1.0
          KRAFT_OTLP_TRACING_ENDPOINT=http://localhost:4318/v1/traces
          KRAFT_COLLECT_LOG_RETENTION_ENABLED=true
          KRAFT_COLLECT_LOG_RETENTION_DAYS=90
          KRAFT_COLLECT_LOG_RETENTION_CRON=0 30 3 * * *
          KRAFT_LOTTO_SCHEDULER_LOCK_AT_MOST_FOR=PT10M
          KRAFT_LOTTO_SCHEDULER_LOCK_AT_LEAST_FOR=PT10S
          KRAFT_LOG_PATH=/app/logs
          KRAFT_HEALTHCHECK_URL=http://localhost:8080/actuator/health/readiness
          KRAFT_HEALTHCHECK_TIMEOUT_SECONDS=3
          EOF
          chmod 600 .env

      - name: Validate Docker Compose file
        run: docker compose config -q

      - name: Prepare logs directory for bind mount
        run: |
          mkdir -p ./logs
          sudo chown -R $USER:$USER ./logs || true
          sudo chmod -R 777 ./logs

      - name: Stop existing services
        run: |
          sudo systemctl stop klo 2>/dev/null || true
          sudo systemctl disable klo 2>/dev/null || true

          docker compose down --remove-orphans || true
          docker compose ps || true

      - name: Build and restart services
        run: |
          docker compose up -d --build --remove-orphans
          docker compose ps
          docker image prune -f

      - name: Verify prod profile env in container
        run: |
          PROFILE=$(docker compose exec -T app sh -lc 'printenv SPRING_PROFILES_ACTIVE')
          echo "SPRING_PROFILES_ACTIVE=$PROFILE"
          test "$PROFILE" = "prod"

      - name: Wait for app readiness
        run: |
          set -u

          CONTAINER_NAME="kraft-lotto-app"
          HEALTH_URL="http://localhost:8080/actuator/health/readiness"
          MAX_ATTEMPTS=60
          SLEEP_SECONDS=5

          echo "Waiting for app readiness: $HEALTH_URL"
          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            STATUS=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}' "$CONTAINER_NAME" 2>/dev/null || echo "missing")
            RESPONSE=$(curl -sS --connect-timeout 3 --max-time 5 -w '\n%{http_code}' "$HEALTH_URL" 2>/dev/null || true)
            HTTP_CODE=$(printf '%s' "$RESPONSE" | tail -n1)
            if ! printf '%s' "$HTTP_CODE" | grep -Eq '^[0-9]{3}$'; then
              HTTP_CODE="000"
              BODY=""
            else
              BODY=$(printf '%s' "$RESPONSE" | sed '$d' | tr -d '\n')
            fi
            echo "[$i/$MAX_ATTEMPTS] docker-health=$STATUS http=$HTTP_CODE body=$BODY"

            if [ "$HTTP_CODE" = "200" ] && printf '%s' "$BODY" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"UP"'; then
              if [ "$STATUS" != "healthy" ]; then
                echo "::warning::HTTP readiness is UP but Docker health is '$STATUS'. Continuing with host-level readiness."
              fi
              echo "App is ready"
              exit 0
            fi

            if [ $((i % 6)) -eq 0 ]; then
              echo "---- Readiness debug ($i/$MAX_ATTEMPTS) ----"
              docker inspect --format='state={{.State.Status}} running={{.State.Running}} restartCount={{.RestartCount}} exitCode={{.State.ExitCode}} error={{.State.Error}} startedAt={{.State.StartedAt}} finishedAt={{.State.FinishedAt}}' "$CONTAINER_NAME" || true
              docker compose ps || true
              docker logs --tail=120 "$CONTAINER_NAME" || true
              docker logs --tail=80 kraft-lotto-mariadb || true
              echo "---- End readiness debug ----"
            fi

            sleep "$SLEEP_SECONDS"
          done

          echo "Readiness check timed out"
          echo "Container health detail:"
          docker inspect --format='{{json .State.Health}}' "$CONTAINER_NAME" || true
          echo "Docker compose status:"
          docker compose ps || true
          echo "App logs:"
          docker logs --tail=300 "$CONTAINER_NAME" || true
          echo "MariaDB logs:"
          docker logs --tail=120 kraft-lotto-mariadb || true
          exit 1

      - name: Smoke test
        run: |
          BODY=$(curl -fsS http://localhost:8080/actuator/health/readiness)
          printf '%s\n' "$BODY"
          printf '%s' "$BODY" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"UP"'
          echo "Smoke test passed"

      - name: Cleanup .env
        if: always()
        run: rm -f .env