name: CD - Deploy to kraft-server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via Docker Compose
    runs-on: [ self-hosted, linux, x64 ]
    environment: production
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from secrets
        run: |
          cat > .env <<EOF
          SPRING_PROFILES_ACTIVE=local
          KRAFT_APP_PORT=8080
          KRAFT_DB_PORT=3306
          KRAFT_DB_NAME=${{ secrets.KRAFT_DB_NAME }}
          KRAFT_DB_URL=jdbc:mariadb://mariadb:3306/${{ secrets.KRAFT_DB_NAME }}?rewriteBatchedStatements=true&useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul&connectTimeout=3000
          KRAFT_DB_USER=${{ secrets.KRAFT_DB_USER }}
          KRAFT_DB_PASSWORD=${{ secrets.KRAFT_DB_PASSWORD }}
          KRAFT_DB_ROOT_PASSWORD=${{ secrets.KRAFT_DB_ROOT_PASSWORD }}
          KRAFT_DB_LOCAL_HOST=localhost
          KRAFT_IN_CONTAINER=true
          KRAFT_ADMIN_USERNAME=${{ secrets.KRAFT_ADMIN_USERNAME }}
          KRAFT_ADMIN_PASSWORD=${{ secrets.KRAFT_ADMIN_PASSWORD }}
          KRAFT_API_CLIENT=dhlottery
          KRAFT_API_URL=https://www.dhlottery.co.kr/common.do
          KRAFT_API_CONNECT_TIMEOUT_MS=2000
          KRAFT_API_READ_TIMEOUT_MS=3000
          KRAFT_API_MAX_RETRIES=2
          KRAFT_API_RETRY_BACKOFF_MS=200
          KRAFT_RECOMMEND_MAX_ATTEMPTS=100000
          KRAFT_RECOMMEND_RATE_LIMIT_MAX_REQUESTS=30
          KRAFT_RECOMMEND_RATE_LIMIT_WINDOW_SECONDS=60
          KRAFT_LOG_PATH=./logs
          EOF
          chmod 600 .env

      - name: Build & restart services
        run: |
          docker compose up -d --build --remove-orphans
          docker image prune -f

      - name: Wait for app to be healthy
        run: |
          echo "Waiting for app health..."
          for i in $(seq 1 40); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' kraft-lotto-app 2>/dev/null || echo "starting")
            echo "[$i/40] status=$STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "✅ App is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Health check timed out"
          docker compose logs --tail=200 app
          exit 1

      - name: Smoke test
        run: |
          curl -fsS http://localhost:8080/actuator/health | grep -q '"status":"UP"'
          echo "✅ Smoke test passed"

      - name: Cleanup .env
        if: always()
        run: rm -f .env