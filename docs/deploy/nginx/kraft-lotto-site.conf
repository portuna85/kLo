# Example Nginx site for kraft.io.kr.
# Suggested target: /etc/nginx/sites-available/kraft-lotto.conf

upstream kraft_lotto_app {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name kraft.io.kr www.kraft.io.kr;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kraft.io.kr www.kraft.io.kr;

    ssl_certificate /etc/letsencrypt/live/kraft.io.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kraft.io.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Trust only local/LAN reverse proxies that are allowed to set X-Forwarded-For.
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 192.168.0.0/24;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://kraft_lotto_app;
        include /etc/nginx/snippets/kraft-lotto-proxy.conf;
    }

    location ^~ /actuator/ {
        allow 127.0.0.1;
        allow 192.168.0.0/24;
        deny all;

        proxy_pass http://kraft_lotto_app;
        include /etc/nginx/snippets/kraft-lotto-proxy.conf;
    }

}
