<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout('회차검색', ~{::section})}">
<section>
  <h1>회차 검색</h1>
  <form method="get" action="/rounds/search">
    <label>회차 <input type="number" name="round" min="1" max="3000" th:value="${round}"></label>
    <button type="submit">검색</button>
  </form>
  <div th:if="${result != null}">
    <p>회차: <span th:text="${result.round}">0</span></p>
    <p>추첨일: <span th:text="${result.drawDate}">-</span></p>
    <p>번호: <span th:text="${result.numbers}">[]</span></p>
    <p>보너스: <span th:text="${result.bonusNumber}">0</span></p>
  </div>
</section>
</html>
