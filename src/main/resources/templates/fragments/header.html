<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="description" content="로또 6/45 추천 서비스" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem('kraft-theme');
        var theme = t || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-bs-theme', theme);
      } catch (_) {
        document.documentElement.setAttribute('data-bs-theme', 'light');
      }
    })();
  </script>
  <title th:text="${title} ?: '최고의번호'">최고의번호</title>

  <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}" />
  <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" />
  <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css}" />
  <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<nav th:fragment="navbar(active)" class="navbar navbar-expand sticky-top kraft-navbar shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/}">
      <i class="bi bi-stars text-warning"></i>
      <span>최고의번호</span>
    </a>
    <div id="kraft-nav" class="navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link"
             th:classappend="${active == 'home'} ? 'active fw-semibold' : ''"
             th:href="@{/}">홈</a>
        </li>
      </ul>
      <button id="themeToggle" type="button"
              class="btn btn-sm btn-outline-secondary"
              aria-label="테마 전환">
        <i class="bi bi-moon-stars"></i>
      </button>
    </div>
  </div>
</nav>
</body>
</html>
