<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!--
  공통 푸터 fragment.
  - footer: 사이트 푸터 영역
  - scripts: Bootstrap bundle + 앱 스크립트 + 토스트 컨테이너
-->
<body>
<footer th:fragment="footer" class="kraft-footer border-top mt-5 py-4">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2 small">
    <span class="text-muted">
      <i class="bi bi-shield-check me-1"></i>
      최고의번호 · 당첨이 아니라 <strong>회피</strong>로.
    </span>
    <span class="text-muted">
      © <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}">2026</span> 최고의번호
    </span>
  </div>
</footer>

<div th:fragment="scripts">
  <div id="toast" role="status" aria-live="polite" class="kraft-toast"></div>
  <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}" defer></script>
  <script type="module" th:src="@{/js/app.js(v=${@environment.getProperty('app.version','1')})}"></script>
</div>
</body>
</html>
