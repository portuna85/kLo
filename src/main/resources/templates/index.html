<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${appName})}"></head>
<body>
<header th:replace="~{fragments/header :: navbar(${activeNav})}"></header>

<main class="container py-4">
  <div class="row g-4">
    <!-- 추천 -->
    <section class="col-12 col-lg-6">
      <div class="card kraft-card h-100">
        <div class="card-body">
          <h2 class="h6 text-uppercase text-muted mb-3">
            <i class="bi bi-shuffle me-1"></i> 추천 조합
          </h2>
          <form id="form-recommend" class="row g-2 align-items-end">
            <div class="col-auto">
              <label class="form-label small text-muted mb-1" for="rec-count">개수</label>
              <input id="rec-count" name="count" type="number" min="1" max="10" value="5"
                     class="form-control form-control-sm" style="width:120px" />
            </div>
            <div class="col-auto">
              <button type="submit" class="btn btn-primary btn-sm">
                <i class="bi bi-magic me-1"></i> 생성
              </button>
            </div>
          </form>
          <div id="recommend-result" class="mt-3" aria-live="polite"></div>
        </div>
      </div>
    </section>

    <!-- 최신 회차 -->
    <section class="col-12 col-lg-6">
      <div class="card kraft-card h-100">
        <div class="card-body">
          <h2 class="h6 text-uppercase text-muted mb-3">
            <i class="bi bi-trophy me-1"></i> 최신 회차
          </h2>
          <div id="latest-result" aria-live="polite">
            <div class="placeholder-glow"><span class="placeholder col-7"></span></div>
          </div>
        </div>
      </div>
    </section>

    <!-- 회차 검색 -->
    <section class="col-12 col-lg-6">
      <div class="card kraft-card h-100">
        <div class="card-body">
          <h2 class="h6 text-uppercase text-muted mb-3">
            <i class="bi bi-search me-1"></i> 회차 검색
          </h2>
          <form id="form-by-round" class="row g-2 align-items-end">
            <div class="col-auto">
              <label class="form-label small text-muted mb-1" for="round-input">회차</label>
              <input id="round-input" name="round" type="number" min="1" placeholder="예: 1100"
                     required class="form-control form-control-sm" style="width:140px" />
            </div>
            <div class="col-auto">
              <button type="submit" class="btn btn-primary btn-sm">
                <i class="bi bi-arrow-right-circle me-1"></i> 조회
              </button>
            </div>
          </form>
          <div id="round-result" class="mt-3" aria-live="polite"></div>
        </div>
      </div>
    </section>

    <!-- 빈도 -->
    <section class="col-12 col-lg-6">
      <div class="card kraft-card h-100">
        <div class="card-body">
          <h2 class="h6 text-uppercase text-muted mb-3">
            <i class="bi bi-bar-chart me-1"></i> 번호별 출현 빈도
          </h2>
          <div id="freq-result" class="kraft-freq-grid" aria-live="polite"></div>
          <div id="freq-low6-result" class="kraft-freq-low6 mt-3" aria-live="polite"></div>
        </div>
      </div>
    </section>

    <!-- 회차 페이지네이션 -->
    <section class="col-12">
      <div class="card kraft-card h-100">
        <div class="card-body">
          <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
            <h2 class="h6 text-uppercase text-muted mb-0">
              <i class="bi bi-collection me-1"></i> 회차 목록
            </h2>
            <div class="d-flex align-items-center gap-2">
              <label class="form-label small text-muted mb-0" for="list-size">페이지 크기</label>
              <select id="list-size" class="form-select form-select-sm" style="width:96px">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
              </select>
            </div>
          </div>
          <div id="list-result" class="kraft-list" aria-live="polite">
            <div class="placeholder-glow"><span class="placeholder col-12"></span></div>
          </div>
          <nav class="d-flex justify-content-between align-items-center mt-3" aria-label="회차 페이지네이션">
            <button id="list-prev" type="button" class="btn btn-sm btn-outline-secondary" disabled>
              <i class="bi bi-chevron-left"></i> 이전
            </button>
            <span id="list-pageinfo" class="small text-muted">-</span>
            <button id="list-next" type="button" class="btn btn-sm btn-outline-secondary" disabled>
              다음 <i class="bi bi-chevron-right"></i>
            </button>
          </nav>
        </div>
      </div>
    </section>
  </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/header :: collectModal}"></div>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
