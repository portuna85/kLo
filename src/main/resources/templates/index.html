<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${appName})}"></head>
<body>
<header th:replace="~{fragments/header :: navbar(${activeNav})}"></header>

<main class="container py-4">
  <div class="row g-4">
    <!-- 異붿쿇 -->
    <section class="col-12 col-lg-6">
      <div class="card kraft-card h-100">
        <div class="card-body">
          <h2 class="h6 text-uppercase text-muted mb-3">
            <i class="bi bi-shuffle me-1"></i> 異붿쿇 議고빀
          </h2>
          <form id="form-recommend" class="row g-2 align-items-end">
            <div class="col-auto">
              <label class="form-label small text-muted mb-1" for="rec-count">媛쒖닔</label>
              <input id="rec-count" name="count" type="number" min="1" max="10" value="5"
                     class="form-control form-control-sm kraft-input-count"  aria-describedby="rec-count-feedback" aria-invalid="false" />
              <div id="rec-count-feedback" class="invalid-feedback d-block small" aria-live="polite"></div>
            </div>
            <div class="col-auto">
              <button type="submit" class="btn btn-primary btn-sm">
                <i class="bi bi-magic me-1"></i> ?앹꽦
              </button>
            </div>
          </form>
          <div id="recommend-result" class="mt-3" aria-live="polite"></div>
        </div>
      </div>
    </section>

    <!-- 理쒖떊 ?뚯감 -->
    <section class="col-12 col-lg-6">
      <div class="card kraft-card h-100">
        <div class="card-body">
          <h2 class="h6 text-uppercase text-muted mb-3">
            <i class="bi bi-trophy me-1"></i> 理쒖떊 ?뚯감
          </h2>
          <div id="latest-result" aria-live="polite">
            <div class="placeholder-glow"><span class="placeholder col-7"></span></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ?뚯감 寃??-->
    <section class="col-12 col-lg-6">
      <div class="card kraft-card h-100">
        <div class="card-body">
          <h2 class="h6 text-uppercase text-muted mb-3">
            <i class="bi bi-search me-1"></i> ?뚯감 寃??          </h2>
          <form id="form-by-round" class="row g-2 align-items-end">
            <div class="col-auto">
              <label class="form-label small text-muted mb-1" for="round-input">?뚯감</label>
              <input id="round-input" name="round" type="number" min="1" placeholder="?? 1100"
                     required class="form-control form-control-sm kraft-input-round" />
            </div>
            <div class="col-auto">
              <button type="submit" class="btn btn-primary btn-sm">
                <i class="bi bi-arrow-right-circle me-1"></i> 議고쉶
              </button>
            </div>
          </form>
          <div id="round-result" class="mt-3" aria-live="polite"></div>
        </div>
      </div>
    </section>

    <!-- 鍮덈룄 -->
    <section class="col-12 col-lg-6">
      <div class="card kraft-card h-100">
        <div class="card-body">
          <h2 class="h6 text-uppercase text-muted mb-3">
            <i class="bi bi-bar-chart me-1"></i> 踰덊샇蹂?異쒗쁽 鍮덈룄
          </h2>
          <div id="freq-result" class="kraft-freq-grid" aria-live="polite"></div>
          <div id="freq-low6-result" class="kraft-freq-low6 mt-3" aria-live="polite"></div>
        </div>
      </div>
    </section>

    <!-- ?뚯감 ?섏씠吏?ㅼ씠??-->
    <section class="col-12">
      <div class="card kraft-card h-100">
        <div class="card-body">
          <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
            <h2 class="h6 text-uppercase text-muted mb-0">
              <i class="bi bi-collection me-1"></i> ?뚯감 紐⑸줉
            </h2>
            <div class="d-flex align-items-center gap-2">
              <label class="form-label small text-muted mb-0" for="list-size">?섏씠吏 ?ш린</label>
              <select id="list-size" class="form-select form-select-sm kraft-list-size">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
              </select>
            </div>
          </div>
          <div id="list-result" class="kraft-list" aria-live="polite">
            <div class="placeholder-glow"><span class="placeholder col-12"></span></div>
          </div>
          <nav class="d-flex justify-content-between align-items-center mt-3" aria-label="?뚯감 ?섏씠吏?ㅼ씠??>
            <button id="list-prev" type="button" class="btn btn-sm btn-outline-secondary" disabled>
              <i class="bi bi-chevron-left"></i> ?댁쟾
            </button>
            <span id="list-pageinfo" class="small text-muted">-</span>
            <button id="list-next" type="button" class="btn btn-sm btn-outline-secondary" disabled>
              ?ㅼ쓬 <i class="bi bi-chevron-right"></i>
            </button>
          </nav>
        </div>
      </div>
    </section>
  </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<div th:replace="~{fragments/footer :: scripts}"></div>
</body>
</html>
