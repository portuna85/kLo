spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

# 운영 환경에서는 OpenAPI / Swagger UI 노출을 비활성화합니다.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 운영 환경에서 actuator 노출 범위를 최소화합니다 (health 만 공개, metrics 등은 ADMIN 인증 필요)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# 운영 환경에서는 admin 계정/패스워드를 환경변수로 반드시 주입해야 합니다.
# 기본값을 두지 않습니다.
kraft:
  admin:
    username: ${KRAFT_ADMIN_USERNAME}
    password: ${KRAFT_ADMIN_PASSWORD}
  api:
    client: ${KRAFT_API_CLIENT:real}
    url: ${KRAFT_API_URL:https://www.dhlottery.co.kr/common.do}
