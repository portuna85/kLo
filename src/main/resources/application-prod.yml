# Production profile overrides.
# Secrets must be injected from environment variables and never hard-coded.

spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    clean-disabled: true
    out-of-order: false
    validate-on-migrate: true
  jpa:
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
  thymeleaf:
    cache: true
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 30d
          cache-public: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  file:
    path: ${KRAFT_LOG_PATH:./logs}

kraft:
  api:
    client: ${KRAFT_API_CLIENT:real}
  recommend:
    rate-limit:
      redis:
        enabled: ${KRAFT_RECOMMEND_RATE_LIMIT_REDIS_ENABLED:true}
