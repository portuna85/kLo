# Production profile overrides.
# Secrets must be injected from environment variables and never hard-coded.

spring:
  jpa:
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
  thymeleaf:
    cache: true
  web:
    resources:
      cache:
        cachecontrol:
          max-age: 30d
          cache-public: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  file:
    path: ${KRAFT_LOG_PATH:./logs}

kraft:
  api:
    client: ${KRAFT_API_CLIENT:real}
