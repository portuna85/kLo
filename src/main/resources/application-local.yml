spring:
  jpa:
    properties:
      hibernate:
        format_sql: true

# 로컬 개발에서는 Swagger UI 를 자유롭게 사용할 수 있도록 활성화합니다.
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

kraft:
  api:
    client: ${KRAFT_API_CLIENT:mock}
