spring:
  application:
    name: kraft-lotto
  # 프로파일을 명시하지 않으면 local 로 동작합니다. (개발 환경 단일 프로파일 정책)
  profiles:
    default: local
  # JDK 21+ 가상스레드 활성화 — 요청 처리/태스크 실행기에 적용
  threads:
    virtual:
      enabled: true
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    cache: true
  web:
    resources:
      static-locations: classpath:/static/, classpath:/META-INF/resources/webjars/
      cache:
        cachecontrol:
          max-age: 7d
          cache-public: true
  datasource:
    # 비민감 기본값만 둡니다. 비밀값/접속 URL 은 .env 로 강제 주입.
    url: ${KRAFT_DB_URL}
    username: ${KRAFT_DB_USER}
    password: ${KRAFT_DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      pool-name: kraft-lotto-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  shutdown: graceful
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json
  http2:
    enabled: true
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never

# API 문서는 Spring REST Docs 산출물(static/docs)로 제공됩니다.

kraft:
  admin:
    # 민감 기본값 제거 — .env 에서 반드시 주입
    username: ${KRAFT_ADMIN_USERNAME}
    password: ${KRAFT_ADMIN_PASSWORD}
  api:
    client: ${KRAFT_API_CLIENT:mock}
    url: ${KRAFT_API_URL:https://www.dhlottery.co.kr/common.do}
    connect-timeout-ms: ${KRAFT_API_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${KRAFT_API_READ_TIMEOUT_MS:3000}
    max-retries: ${KRAFT_API_MAX_RETRIES:2}
    retry-backoff-ms: ${KRAFT_API_RETRY_BACKOFF_MS:200}
  recommend:
    max-attempts: ${KRAFT_RECOMMEND_MAX_ATTEMPTS:100000}
  logging:
    # 로그 파일 출력 경로 (logback-spring.xml 에서 ${LOG_PATH} 로 사용).
    # 컨테이너에서는 docker-compose 의 볼륨이 /app/logs 로 마운트됩니다.
    path: ${KRAFT_LOG_PATH:./logs}
