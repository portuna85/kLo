spring:
  application:
    name: kraft-lotto
  profiles:
    default: local
  threads:
    virtual:
      enabled: true
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    cache: true
  web:
    resources:
      static-locations: classpath:/static/, classpath:/META-INF/resources/webjars/
      cache:
        cachecontrol:
          max-age: 7d
          cache-public: true
  datasource:
    url: ${KRAFT_DB_URL}
    username: ${KRAFT_DB_USER}
    password: ${KRAFT_DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      pool-name: kraft-lotto-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  shutdown: graceful
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json
  http2:
    enabled: true
  forward-headers-strategy: NATIVE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,db

kraft:
  lotto:
    scheduler:
      enabled: ${KRAFT_LOTTO_SCHEDULER_ENABLED:true}
  collect:
    auto:
      enabled: ${KRAFT_COLLECT_AUTO_ENABLED:true}
      zone: ${KRAFT_COLLECT_AUTO_ZONE:Asia/Seoul}
      cron:
        saturday-21-10: ${KRAFT_COLLECT_AUTO_CRON_SATURDAY_21_10:0 10 21 ? * SAT}
        saturday-21-retry: ${KRAFT_COLLECT_AUTO_CRON_SATURDAY_21_RETRY:0 20,40 21 ? * SAT}
        saturday-22-10: ${KRAFT_COLLECT_AUTO_CRON_SATURDAY_22_10:0 10 22 ? * SAT}
        sunday-06-10: ${KRAFT_COLLECT_AUTO_CRON_SUNDAY_06_10:0 10 6 ? * SUN}
        daily-09-00: ${KRAFT_COLLECT_AUTO_CRON_DAILY_09_00:0 0 9 * * *}
  api:
    client: ${KRAFT_API_CLIENT:mock}
    url: ${KRAFT_API_URL:https://www.dhlottery.co.kr/common.do}
    connect-timeout-ms: ${KRAFT_API_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${KRAFT_API_READ_TIMEOUT_MS:5000}
    max-retries: ${KRAFT_API_MAX_RETRIES:2}
    retry-backoff-ms: ${KRAFT_API_RETRY_BACKOFF_MS:700}
    fallback-to-mock-on-failure: ${KRAFT_API_FALLBACK_TO_MOCK_ON_FAILURE:false}
    mock-latest-round: ${KRAFT_API_MOCK_LATEST_ROUND:1200}
  admin:
    api-token: ${KRAFT_ADMIN_API_TOKEN:}
    token-header: ${KRAFT_ADMIN_TOKEN_HEADER:X-Kraft-Admin-Token}
  recommend:
    max-attempts: ${KRAFT_RECOMMEND_MAX_ATTEMPTS:5000}
    rules:
      birthday-threshold: ${KRAFT_RECOMMEND_RULE_BIRTHDAY_THRESHOLD:31}
      long-run-threshold: ${KRAFT_RECOMMEND_RULE_LONG_RUN_THRESHOLD:5}
      decade-threshold: ${KRAFT_RECOMMEND_RULE_DECADE_THRESHOLD:5}
    rate-limit:
      max-requests: ${KRAFT_RECOMMEND_RATE_LIMIT_MAX_REQUESTS:30}
      window-seconds: ${KRAFT_RECOMMEND_RATE_LIMIT_WINDOW_SECONDS:60}
      recommend:
        max-requests: ${KRAFT_RECOMMEND_RATE_LIMIT_MAX_REQUESTS:30}
        window-seconds: ${KRAFT_RECOMMEND_RATE_LIMIT_WINDOW_SECONDS:60}
      collect:
        max-requests: ${KRAFT_COLLECT_RATE_LIMIT_MAX_REQUESTS:10}
        window-seconds: ${KRAFT_COLLECT_RATE_LIMIT_WINDOW_SECONDS:300}
  logging:
    path: ${KRAFT_LOG_PATH:./logs}
