spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    database-platform: org.hibernate.dialect.MariaDBDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

kraft:
  api:
    client: mock
    url: http://localhost
    connect-timeout-ms: 2000
    read-timeout-ms: 3000
    max-retries: 2
    retry-backoff-ms: 50
  admin:
    api-token: test-admin-token
    token-header: X-Kraft-Admin-Token
  recommend:
    max-attempts: 1000
    rate-limit:
      max-requests: 30
      window-seconds: 60
      recommend:
        max-requests: 30
        window-seconds: 60
      collect:
        max-requests: 30
        window-seconds: 60
