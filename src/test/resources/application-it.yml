spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

kraft:
  api:
    client: mock
    url: http://localhost
    connect-timeout-ms: 2000
    read-timeout-ms: 3000
    max-retries: 2
    retry-backoff-ms: 50
  recommend:
    max-attempts: 1000

logging:
  level:
    org.hibernate.orm.deprecation: ERROR
    org.flywaydb.core.internal.database.base.Database: ERROR
    org.flywaydb.core.internal.sqlscript.DefaultSqlScriptExecutor: ERROR
    org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration: ERROR
    org.mariadb.jdbc.message.server.ErrorPacket: ERROR
    org.hibernate.orm.jdbc.error: ERROR
