name: kraft-lotto

services:
  mariadb:
    image: mariadb:11.7
    pull_policy: missing
    container_name: kraft-lotto-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${KRAFT_DB_NAME:?KRAFT_DB_NAME is required}
      MARIADB_USER: ${KRAFT_DB_USER:?KRAFT_DB_USER is required}
      MARIADB_PASSWORD: ${KRAFT_DB_PASSWORD:?KRAFT_DB_PASSWORD is required}
      MARIADB_ROOT_PASSWORD: ${KRAFT_DB_ROOT_PASSWORD:?KRAFT_DB_ROOT_PASSWORD is required}
      TZ: Asia/Seoul
    ports:
      - "${KRAFT_DB_PORT:-3306}:3306"
    networks:
      - kraft-net
    volumes:
      - kraft-lotto-db:/var/lib/mysql
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - CMD
        - healthcheck.sh
        - --connect
        - --innodb_initialized
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GRADLE_BUILD_ARGS: ${GRADLE_BUILD_ARGS:-}
    pull_policy: missing
    image: kraft-lotto-app:local
    container_name: kraft-lotto-app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:?SPRING_PROFILES_ACTIVE is required (e.g. local|prod)}
      KRAFT_IN_CONTAINER: "true"
      KRAFT_DB_URL: jdbc:mariadb://mariadb:3306/${KRAFT_DB_NAME:?KRAFT_DB_NAME is required}?rewriteBatchedStatements=true&useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul&connectTimeout=3000
      TZ: Asia/Seoul
    ports:
      - "${KRAFT_APP_PORT:-8080}:8080"
    networks:
      - kraft-net
    volumes:
      - ./logs:/app/logs
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "/app/healthcheck.sh" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

networks:
  kraft-net:
    name: kraft-lotto-net
    driver: bridge

volumes:
  kraft-lotto-db:
    name: kraft-lotto-db
