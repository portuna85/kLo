# ============================================================
#  KraftLotto — Docker Compose (개발 단일 프로파일: local)
#  - 모든 환경 변수는 .env 한 파일에서 주입됩니다 (SSoT).
#  - 비밀값은 본 파일에 절대 하드코딩하지 않습니다.
#  - 프로젝트명/네트워크/볼륨을 명시 선언하여 완전 재생성을 지원합니다.
# ============================================================
name: kraft-lotto

services:
  mariadb:
    image: mariadb:11.8
    container_name: kraft-lotto-mariadb
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MARIADB_DATABASE: ${KRAFT_DB_NAME:?KRAFT_DB_NAME is required}
      MARIADB_USER: ${KRAFT_DB_USER:?KRAFT_DB_USER is required}
      MARIADB_PASSWORD: ${KRAFT_DB_PASSWORD:?KRAFT_DB_PASSWORD is required}
      MARIADB_ROOT_PASSWORD: ${KRAFT_DB_ROOT_PASSWORD:?KRAFT_DB_ROOT_PASSWORD is required}
      TZ: Asia/Seoul
    ports:
      - "${KRAFT_DB_PORT:-3306}:3306"
    networks:
      - kraft-net
    volumes:
      - kraft-lotto-db:/var/lib/mysql
    healthcheck:
      test:
        - CMD
        - healthcheck.sh
        - --connect
        - --innodb_initialized
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kraft-lotto-app:local
    container_name: kraft-lotto-app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      KRAFT_IN_CONTAINER: "true"
      # 컨테이너 네트워크에서는 호스트가 'mariadb' 입니다.
      # .env 의 KRAFT_DB_URL 이 이미 mariadb 호스트로 설정되어 있다면 이 항목은 생략 가능하지만,
      # 호스트 OS 에서 동일 .env 를 로컬 실행에 재사용할 가능성을 고려해 컨테이너 전용으로 강제합니다.
      KRAFT_DB_URL: jdbc:mariadb://mariadb:3306/${KRAFT_DB_NAME:?KRAFT_DB_NAME is required}?rewriteBatchedStatements=true&useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul&connectTimeout=3000
      KRAFT_HEALTHCHECK_URL: http://localhost:8080/actuator/health/liveness
      KRAFT_HEALTHCHECK_TIMEOUT_SECONDS: "2"
      TZ: Asia/Seoul
    ports:
      - "${KRAFT_APP_PORT:-8080}:8080"
    networks:
      - kraft-net
    volumes:
      # 애플리케이션 로그를 호스트에서도 바로 확인할 수 있도록 바인드 마운트.
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s

networks:
  kraft-net:
    name: kraft-lotto-net
    driver: bridge

volumes:
  kraft-lotto-db:
    name: kraft-lotto-db
